<script>
const PAYLOADS=JSON.parse(document.getElementById('LA').textContent);
const de=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function tryPayload(P,word){
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(word),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:de(P.salt),iterations:310000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:de(P.iv)},key,de(P.data));
  return await new Response(new Blob([plain]).stream().pipeThrough(new DecompressionStream('gzip'))).text();
}
async function unlock(word){
  // the same door, two keys: the full archive or the guest walk —
  // whichever the word fits
  let lastErr;
  for (const P of [PAYLOADS.full, PAYLOADS.guest].filter(Boolean)) {
    try {
      const html=await tryPayload(P,word);
      localStorage.setItem('la-word',word);
      document.open();document.write(html);document.close();
      return;
    } catch(e){ lastErr=e; }
  }
  throw lastErr||new Error('no');
}
document.getElementById('f').addEventListener('submit',async e=>{
  e.preventDefault();
  const err=document.getElementById('err');err.textContent='';err.classList.remove('on');
  try{await unlock(document.getElementById('w').value)}
  catch(_){err.textContent="That's not the word.";err.classList.add('on')}
});
// a device that has spoken the word before may pass quietly
const saved=localStorage.getItem('la-word');
if(saved)unlock(saved).catch(()=>localStorage.removeItem('la-word'));
</script>
